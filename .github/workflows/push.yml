      #   run: |
      #     cd v8
      #     sed -i '' 's/from collections import Mapping/from collections.abc import Mapping/' third_party/jinja2/tests.py
      - name: Set build args
        run: |
          cd v8
          mkdir -p out.gn/${PLATFORM}
          export IS_CLANG=true
          [ "$BUILD_TYPE" = "debug" ] && \
            export IS_DEBUG=true SYMBOL_LEVEL=2 || \
